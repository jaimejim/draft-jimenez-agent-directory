name: "Update Editor's Copy"

on:
  push:
    paths-ignore:
    - README.md
    - CONTRIBUTING.md
    - LICENSE.md
    - .gitignore
  pull_request:
    paths-ignore:
    - README.md
    - CONTRIBUTING.md
    - LICENSE.md
    - .gitignore

jobs:
  build:
    name: "Update Editor's Copy"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - name: "Checkout"
      uses: actions/checkout@v6

    - name: "Setup"
      id: setup
      run: date -u "+date=%FT%T" >>"$GITHUB_OUTPUT"

    - name: "Caching"
      uses: actions/cache@v5
      with:
        path: |
          .refcache
          .venv
          .gems
          node_modules
          .targets.mk
        key: i-d-${{ steps.setup.outputs.date }}
        restore-keys: i-d-

    - name: "Build Drafts"
      id: build
      uses: martinthomson/i-d-template@v1
      with:
        token: ${{ github.token }}

    - name: "Fix Lints"
      id: fix-lint
      if: always() && steps.build.outcome == 'failure'
      uses: martinthomson/i-d-template@v1
      with:
        make: fix-lint

    - name: "Propose Linting Fixes"
      if: >
        always() &&
        steps.fix-lint.outcome != 'skipped' &&
        github.event.pull_request &&
        github.event.pull_request.head.repo.full_name == github.repository
      uses: parkerbxyz/suggest-changes@v3
      with:
        token: ${{ github.token }}

    - name: "Update GitHub Pages"
      uses: martinthomson/i-d-template@v1
      if: ${{ github.event_name == 'push' }}
      with:
        make: gh-pages
        token: ${{ github.token }}

    # Custom domain (jaime.win) is not on author-tools' iddiff allowlist, and
    # jaimejim.github.io 301-redirects to it. Rewrite iddiff url params to
    # raw.githubusercontent.com, which is allowlisted.
    - name: "Rewrite iddiff URLs to raw.githubusercontent.com"
      if: ${{ github.event_name == 'push' }}
      env:
        OWNER: ${{ github.repository_owner }}
        REPO: ${{ github.event.repository.name }}
      run: |
        set -euo pipefail
        git fetch --depth=1 origin gh-pages
        git worktree add /tmp/ghpages-rewrite FETCH_HEAD
        cd /tmp/ghpages-rewrite
        git checkout -B gh-pages
        find . -name index.html -print0 | xargs -0 -r sed -i -E \
          "s|(url_[12]=)https://${OWNER}\.github\.io/${REPO}/|\1https://raw.githubusercontent.com/${OWNER}/${REPO}/gh-pages/|g"
        if ! git diff --quiet; then
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -am "Rewrite iddiff URLs to raw.githubusercontent.com [ci skip]"
          git push origin gh-pages
        fi

    - name: "Archive Built Drafts"
      uses: actions/upload-artifact@v6
      with:
        name: drafts
        path: |
          draft-*.html
          draft-*.txt
